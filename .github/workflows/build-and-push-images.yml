# Build and push API, Queue, and Proxy Docker images to GitHub Container Registry.
# Images are used by the Helm chart for Kubernetes deployment.

name: Build and Push Container Images to GHCR

on:
  push:
    branches:
      - main
      - dev-kubernetes
    paths-ignore:
      - 'helm/**'
      - '.github/workflows/publish-api-chart.yaml'
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # API image: same as repo (e.g. ghcr.io/runtime-software-development/mle-api)
  API_IMAGE: ${{ github.repository }}
  # Queue and proxy: same owner, distinct package names for GHCR
  QUEUE_IMAGE: ${{ github.repository_owner }}/mle-queue
  PROXY_IMAGE: ${{ github.repository_owner }}/mle-api-proxy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- API image ---
      - name: Extract metadata for API image
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=sha,prefix=
            type=ref,event=tag

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Queue image ---
      - name: Extract metadata for Queue image
        id: meta-queue
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.QUEUE_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=sha,prefix=
            type=ref,event=tag

      - name: Build and push Queue image
        uses: docker/build-push-action@v5
        with:
          context: ./queue
          file: ./queue/Dockerfile
          push: true
          tags: ${{ steps.meta-queue.outputs.tags }}
          labels: ${{ steps.meta-queue.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Proxy (NGINX) image ---
      - name: Extract metadata for Proxy image
        id: meta-proxy
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.PROXY_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=sha,prefix=
            type=ref,event=tag

      - name: Build and push Proxy image
        uses: docker/build-push-action@v5
        with:
          context: ./proxy
          file: ./proxy/Dockerfile
          push: true
          tags: ${{ steps.meta-proxy.outputs.tags }}
          labels: ${{ steps.meta-proxy.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Images pushed to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ github.ref == 'refs/heads/main' && 'latest' || github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.QUEUE_IMAGE }}:${{ github.ref == 'refs/heads/main' && 'latest' || github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.PROXY_IMAGE }}:${{ github.ref == 'refs/heads/main' && 'latest' || github.sha }}\`" >> $GITHUB_STEP_SUMMARY
