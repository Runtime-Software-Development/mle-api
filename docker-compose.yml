services:
  backend-api:
    image: mle-node-api
    container_name: mle-api
    build:
      context: .
      dockerfile: ./Dockerfile
    env_file:
      - .env
    ports:
      - 3001:3001
    volumes:
      - ../mle-data/:/mnt/mle-files
    depends_on:
      - backend-db
      - backend-queue
    networks:
       - app-network
  backend-db:
    image: postgres:17.4
    container_name: mle-db
    restart: always
    volumes:
      - ../mle-db/init:/docker-entrypoint-initdb.d
      - ../mle-db/pgdata:/var/lib/postgresql/data
    ports:
      - 5432:5432
    env_file:
      - .env
    # healthcheck:
    #   test: ["CMD", "pg_isready", "-U", "boutrous"]
    #   interval: 1s
    #   timeout: 5s
    #   retries: 10
    networks:
       - app-network
  backend-queue:
    image: redis:latest
    container_name: mle-queue
    ports:
      - 6379:6379
networks:
  app-network:
    driver: bridge
