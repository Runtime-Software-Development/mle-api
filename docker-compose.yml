services:
  mlpapi:
    image: mlp-api
    build:
      context: .
      dockerfile: ./Dockerfile
    env_file:
      - .env
    ports:
      - 3001:3001
      - 9229:9229
    command: ["npm", "--inspect=0.0.0.0:9229", "start"]
    depends_on:
      postgres:
        condition: service_healthy

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    command: start-dev --http-port=8081 --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-mem 
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/realms/master"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - ./kiln-test-realm.json:/opt/keycloak/data/import/kiln-test-realm.json

  postgres:
    image: postgres:16-alpine 
    environment:
      POSTGRES_DB: mlp_db
      POSTGRES_USER: mlp_user 
      POSTGRES_PASSWORD: mlp_password
    volumes:
      - ./db_init:/docker-entrypoint-initdb.d/
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlp_user -d mlp_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: