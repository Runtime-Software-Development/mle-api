apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-queue-comms-final
  namespace: mlp-explorer-test
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: queue
  policyTypes:
  - Egress
  egress:
  # 1. Allow TCP to Redis on 6379
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/component: redis
    ports:
    - protocol: TCP
      port: 6379
  # 2. Universal DNS Allow (No namespace selector)
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53