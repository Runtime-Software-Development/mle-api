apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-api-comms
  namespace: mlp-explorer-test
  labels:
    capsule.clastix.io/managed-by: mlp-explorer
spec:
  podSelector: {} # Applies to ALL pods in the namespace to evaluate rules
  policyTypes:
    - Ingress
    - Egress
  
  # 1. Allow the frontend pod to send traffic OUT to port 3000
  egress:
    - ports:
        - protocol: TCP
          port: 3000
      to:
        - podSelector:
            matchLabels:
              # Targets pods matching your API's app name label
              app.kubernetes.io/name: mle-api 

  # 2. Allow the API pod to receive traffic IN on port 3000 from the frontend
  ingress:
    - ports:
        - protocol: TCP
          port: 3000
      from:
        - podSelector:
            matchLabels:
              # Targets pods matching your frontend's app name label
              app.kubernetes.io/name: mle-frontend