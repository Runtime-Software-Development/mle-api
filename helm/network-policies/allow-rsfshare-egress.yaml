apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rsfshare-egress
  namespace: mlp-explorer-test
spec:
  podSelector: {} # Applies to all pods in this namespace
  policyTypes:
  - Egress
  egress:
  # 1. Core DNS Whitelist
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

  # 2. Strict Whitelist for the .14 Target
  - to:
    - ipBlock:
        cidr: 142.104.55.14/32
    ports:
    - protocol: TCP
      port: 111
    - protocol: TCP
      port: 2049
    - protocol: UDP
      port: 111
    - protocol: UDP
      port: 2049

  # 3. Strict Whitelist for the .13 Target
  - to:
    - ipBlock:
        cidr: 142.104.55.13/32
    ports:
    - protocol: TCP
      port: 111
    - protocol: TCP
      port: 2049
    - protocol: UDP
      port: 111
    - protocol: UDP
      port: 2049