{{- if .Values.mleAPI.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mleAPI.fullname" . }}-api
  labels:
    {{- include "mleAPI.labels" . | nindent 4 }}
spec:
  {{- if not .Values.mleAPI.autoscaling.enabled }}
  replicas: {{ .Values.mleAPI.replicaCount }}
  {{- end }}
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      {{- include "mleAPI.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.mleAPI.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "mleAPI.labels" . | nindent 8 }}
        {{- with .Values.mleAPI.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.mleAPI.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.global.serviceAccount.name }}
      serviceAccountName: {{ .Values.global.serviceAccount.name }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.mleAPI.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.mleAPI.securityContext | nindent 12 }}
          image: "{{ .Values.mleAPI.image.repository }}:{{ .Values.mleAPI.image.tag }}"
          imagePullPolicy: {{ .Values.mleAPI.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.mleAPI.service.port }}
              protocol: TCP
          {{- if .Values.mleAPI.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: /api/
              port: http
            initialDelaySeconds: {{ .Values.mleAPI.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.mleAPI.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.mleAPI.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.mleAPI.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.mleAPI.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: /api/
              port: http
            initialDelaySeconds: {{ .Values.mleAPI.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.mleAPI.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.mleAPI.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.mleAPI.probes.readiness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.mleAPI.resources | nindent 12 }}
          env:
            {{- if .Values.mleAPI.env }}
            {{- toYaml .Values.mleAPI.env | nindent 12 }}
            {{- end }}
            # Redis — injected as individual vars to match app expectations
            - name: MLE_REDIS_HOST
              value: "{{ include "redis.fullname" . }}-svc"
            - name: MLE_REDIS_PORT
              value: {{ .Values.redis.service.port | quote }}
            # Queue worker URL
            - name: MLE_QUEUE_SERVER_URL
              value: "http://{{ include "queue.fullname" . }}-svc:{{ .Values.queue.service.port | default 3002 }}"
            {{- if .Values.keycloak.enabled }}
            # Keycloak — env var names match the app's MLE_KC_* convention
            - name: MLE_KC_SERVER_URL
              value: "http://{{ include "keycloak.fullname" . }}-svc:{{ .Values.keycloak.service.port }}"
            - name: MLE_KC_REALM
              value: {{ .Values.keycloak.realm.name | quote }}
            - name: MLE_KC_CLIENT_ID
              value: {{ .Values.keycloak.realm.clientId | quote }}
            {{- end }}
            - name: REDIRECT_URL
              value: "http://{{ include "mleAPI.fullname" . }}-api-svc:{{ .Values.mleAPI.service.port }}/authn/callback"
          # Sensitive vars injected from pre-created Secrets.
          # MLE_COOKIE_SECRET, MLE_KC_CLIENT_SECRET, MLE_API_PASS/HASH/SALT → mle-api-secrets
          # POSTGRES_HOST/PORT/DB/USER/PASSWORD                              → mle-db-secret
          envFrom:
            - secretRef:
                name: {{ .Values.mleAPI.session.secretName }}
            - secretRef:
                name: {{ .Values.mleAPI.database.secretName }}
            {{- with .Values.mleAPI.envFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.mleAPI.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.mleAPI.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mleAPI.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mleAPI.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mleAPI.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
