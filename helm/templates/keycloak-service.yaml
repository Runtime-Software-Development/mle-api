{{- if .Values.keycloak.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "keycloak.fullname" . }}-svc
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  type: {{ .Values.keycloak.service.type | default "ClusterIP" }}
  ports:
    - name: http
      port: {{ .Values.keycloak.service.port }}
      targetPort: {{ .Values.keycloak.http.port }}
      protocol: TCP
  selector:
    {{- include "keycloak.selectorLabels" . | nindent 4 }}
{{- end }}
