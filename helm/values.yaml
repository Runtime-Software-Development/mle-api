global:
  nameOverride: ""
  fullnameOverride: ""
  serviceAccount:
    # Leave empty to skip binding a service account to pods
    name: ""
    create: false
    automount: false
  # -- List of servers proxied by the MLE API
  servers: []

# -- Node.js MLE API default configuration
mleAPI:

  enabled: true

  replicaCount: 1

  image:
    repository: "ghcr.io/runtime-software-development/mle-api"
    tag: "latest"
    pullPolicy: Always

  # GHCR package visibility is org-restricted — pull secret required.
  # kubectl create secret docker-registry ghcr-pull-secret \
  #   --docker-server=ghcr.io \
  #   --docker-username=<github-username> \
  #   --docker-password=<github-pat-with-read:packages>
  imagePullSecrets:
    - name: ghcr-pull-secret

  podAnnotations: {}
  podLabels: {}

  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
    # Ensures mounted volumes are writable by the node user (UID 1000)
    fsGroup: 1000

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  # Persistent storage for log files written by the API
  # Note: cinder.csi.openstack.org only supports ReadWriteOnce
  persistence:
    logs:
      enabled: true
      size: 1Gi
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      mountPath: /usr/src/app/logs

  env:
    # Runtime
    - name: NODE_ENV
      value: "production"
    - name: PORT
      value: "3000"
    - name: MLE_API_PORT
      value: "3000"
    - name: APP_ID
      value: "mle-api"
    - name: LOG_LEVEL
      value: "info"
    - name: MLE_LOG_FORMAT
      value: "combined"
    - name: REQUEST_LIMIT
      value: "100kb"
    - name: SWAGGER_API_SPEC
      value: "/api/spec"
    # App URLs — override these per environment
    - name: MLE_APP_BASEURL
      value: "http://localhost:3000"
    - name: MLE_API_BASEURL
      value: "http://localhost:3000"
    # Queue config (connection vars are injected dynamically by the template)
    - name: MLE_QUEUE_NAME
      value: "mle-queue"
    - name: MLE_QUEUE_CONCURRENCY
      value: "5"
    - name: MLE_QUEUE_PORT
      value: "3002"
    # File paths
    - name: MLE_UPLOAD_DIR
      value: "/usr/src/app/data/uploads"
    - name: MLE_TMP_DIR
      value: "/usr/src/app/data/tmp"
    - name: MLE_LOWRES_DIR
      value: "/usr/src/app/data/versions"
    - name: MLE_ROOT_DIR
      value: "/usr/src/app"
    # Logging
    - name: MLE_LOG_DIR
      value: "/usr/src/app/logs"
    - name: MLE_ACCESS_LOG_FILE
      value: "access.log"
    - name: MLE_ERROR_LOG_FILE
      value: "error.log"

  # Sensitive API credentials — pre-create with:
  # kubectl create secret generic mle-api-secrets \
  #   --from-literal=MLE_COOKIE_SECRET=<value> \
  #   --from-literal=MLE_KC_CLIENT_SECRET=<value> \
  #   --from-literal=MLE_API_PASS=<value> \
  #   --from-literal=MLE_API_HASH=<value> \
  #   --from-literal=MLE_API_SALT=<value>
  session:
    secretName: "mle-api-secrets"

  # Postgres credentials — pre-create with:
  # kubectl create secret generic mle-db-secret \
  #   --from-literal=POSTGRES_HOST=<host> \
  #   --from-literal=POSTGRES_PORT=5432 \
  #   --from-literal=POSTGRES_DB=mle_db \
  #   --from-literal=POSTGRES_USER=<user> \
  #   --from-literal=POSTGRES_PASSWORD=<password>
  database:
    secretName: "mle-db-secret"

  # Additional envFrom sources (ConfigMaps or Secrets) injected into the container
  envFrom: []
  # - secretRef:
  #     name: some-other-secret

  service:
    type: ClusterIP
    port: 3000

  ingress:
    enabled: false
    className: "nginx"
    annotations: {}
      # cert-manager.io/cluster-issuer: letsencrypt-prod
      # nginx.ingress.kubernetes.io/rewrite-target: /
    hosts:
      - host: mle-api.example.com
        paths:
          - path: /api
            pathType: Prefix
    tls: []
    #  - secretName: mle-api-tls
    #    hosts:
    #      - mle-api.example.com

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

  volumes: []
  volumeMounts: []

  nodeSelector: {}
  tolerations: []
  affinity: {}

  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

# -- MLE Queue worker (Bull/Redis job processor)
queue:
  enabled: true
  replicaCount: 1

  image:
    repository: "ghcr.io/runtime-software-development/mle-queue"
    tag: "0a06ac1"
    pullPolicy: IfNotPresent

  imagePullSecrets:
    - name: ghcr-pull-secret

  podAnnotations: {}
  podLabels: {}

  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  # Additional env vars for the queue worker (Redis host/port injected automatically)
  env: []

  service:
    type: ClusterIP
    port: 3002

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

  volumes: []
  volumeMounts: []

  nodeSelector: {}
  tolerations: []
  affinity: {}

  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

# -- Redis Datastore configuration
redis:

  enabled: true
  replicaCount: 1

  image:
    repository: redis
    tag: "8.0.2"
    pullPolicy: IfNotPresent

  imagePullSecrets: []

  podAnnotations: {}
  podLabels: {}

  podSecurityContext:
    fsGroup: 999
    seccompProfile:
      type: RuntimeDefault

  # Redis official image runs as UID 999
  securityContext:
    runAsNonRoot: true
    runAsUser: 999
    runAsGroup: 999
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  service:
    type: ClusterIP
    port: 6379

  env: {}

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80

  persistence:
    size: 100Mi
    storageClassName: ""

  volumes: []
  volumeMounts: []

  nodeSelector: {}
  tolerations: []
  affinity: {}

# -- Keycloak Identity Provider
keycloak:

  enabled: true
  replicaCount: 1

  image:
    repository: quay.io/keycloak/keycloak
    tag: "24.0.2"
    pullPolicy: IfNotPresent

  # Admin credentials — pre-create with:
  # kubectl create secret generic keycloak-admin-secret \
  #   --from-literal=admin-username=admin \
  #   --from-literal=admin-password=<strong-password>
  admin:
    secretName: "keycloak-admin-secret"
    usernameKey: "admin-username"
    passwordKey: "admin-password"

  http:
    port: 8081

  # Set to your actual public hostname in production
  hostname: "localhost"

  # Database vendor: "dev-file" (H2, dev/test only) or "postgres" (production)
  # For postgres, also configure KC_DB_URL, KC_DB_USERNAME, KC_DB_PASSWORD
  # via additional env vars or a secret.
  db:
    vendor: "dev-file"

  # Realm initialization — imported from a pre-created Kubernetes Secret.
  # Keycloak skips import if the realm already exists.
  # Create with:
  #   kubectl create secret generic keycloak-realm-secret \
  #     --from-file=mle-realm.json=./mle-realm.json
  realm:
    secretName: "keycloak-realm-secret"
    secretKey: "mle-realm.json"
    # Non-sensitive realm identifiers — used to inject env vars into the API
    name: "mle-realm"
    clientId: "mle-kc-client"

  service:
    type: ClusterIP
    port: 8081

  ingress:
    enabled: false
    className: "nginx"
    annotations: {}
    host: "keycloak.example.com"
    path: /
    pathType: Prefix
    tls:
      enabled: false
      secretName: ""

  # H2 persistence — only relevant when db.vendor is dev-file.
  # For postgres deployments this is not needed.
  persistence:
    enabled: false
    size: 1Gi
    storageClassName: ""

  podAnnotations: {}
  podLabels: {}

  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault

  # Keycloak official image runs as UID 1000
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  nodeSelector: {}
  tolerations: []
  affinity: {}

  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 120
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 6
    readiness:
      enabled: true
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

# -- NGINX Reverse Proxy (disabled — Kubernetes Ingress handles routing)
nginx:
  enabled: false
