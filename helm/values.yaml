global:
  nameOverride: ""
  fullnameOverride: ""
  licenseplate: "ed84ea"
  cluster: "silver"
  serviceAccount:
    name: "ed84ea-vault"
    # Specifies whether a service account should be created
    create: false
    # Automatically mount a ServiceAccount's API credentials?
    automount: true
  vault:
    # Path where Vault injector mounts secrets (e.g. /vault/secrets)
    containerPath: "/vault/secrets"
  # -- List of servers proxied by the MLE API
  servers: []

# -- Node.js MLE API default configuration
mleAPI:

  enabled: true

  replicaCount: 1

  image:
    repository: "ghcr.io/runtime-software-development/mle-api"
    tag: "latest"
    pullPolicy: IfNotPresent

  vault:
    # Name of the Vault secret to inject into the container.
    secret: "keycloak-config"

  # -- Image Pull Secrets for Private GHCR
  imagePullSecrets: []
 
  podAnnotations: {}
  podLabels: {}

  podSecurityContext: {}
    # fsGroup: 2000

  securityContext:
    runAsNonRoot: true
    # runAsUser: 1001 # DO NOT SET THIS if you want OpenShift to assign a random non-root UID
    allowPrivilegeEscalation: false # Recommended for security
    capabilities:
      drop:
        - ALL

  env:
    - name: APP_ID
      value: "mle-api-test"
    - name: PORT
      value: "3000"
    - name: LOG_LEVEL
      value: "debug"
    - name: REQUEST_LIMIT
      value: "100kb"
    - name: SWAGGER_API_SPEC
      value: "/api/spec"

  session:
    # Secret name for session secret
    secretName: "mle-api-secrets"
    secretKey: "session_secret"

  service:
    type: ClusterIP
    port: 3000

  ingress:
    enabled: false
    className: ""
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"
    hosts:
      - host: chart-example.local
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

  resources:
    limits:
      cpu: 50m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 128Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

  # Additional volumes on the output Deployment definition.
  volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

  # Additional volumeMounts on the output Deployment definition.
  volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

  envFrom: []

  nodeSelector: {}

  tolerations: []

  affinity: {}

  # Liveness and Readiness Probes
  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

# -- MLE Queue worker (Bull/Redis job processor)
queue:
  enabled: true
  replicaCount: 1

  image:
    repository: "ghcr.io/runtime-software-development/mle-queue"
    tag: "latest"
    pullPolicy: IfNotPresent

  imagePullSecrets: []

  podAnnotations: {}
  podLabels: {}

  podSecurityContext: {}
  securityContext: {}
    # runAsNonRoot: true
    # allowPrivilegeEscalation: false

  env: []
    # POSTGRES_HOST, POSTGRES_PORT, etc. if queue needs DB
  # Redis host/port are set automatically from release Redis service name

  service:
    type: ClusterIP
    port: 3002

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

  volumes: []
  volumeMounts: []

  nodeSelector: {}
  tolerations: []
  affinity: {}

  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

