# -- NGINX Reverse Proxy configuration
nginx:

  enabled: true
  replicaCount: 1

  image:
    repository: "ghcr.io/runtime-software-development/mle-api-proxy"
    tag: latest
    pullPolicy: Always

  # Use serverBlocks to provide entire Nginx server block definitions
  # This will completely override the default generated server blocks.
  # Ensure proper Nginx syntax and indentation within this string.
  serverBlocks: |
    map $http_username $username_cookie {
        default "";
        ""      "";
        ~.+     "$http_username";
    }

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            add_header Set-Cookie "originalServer=$http_x_original_server; Path=/; SameSite=Lax" always;
            add_header Set-Cookie "username=$username_cookie; Path=/" always;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://mle-api-svc:3000;
            
            #Debug proxyhost
            add_header X-Debug-Upstream "$scheme://$proxy_host$request_uri" always;

            proxy_ssl_server_name on;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Original-Server $http_x_original_server;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot|json)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        error_page 404 /index.html;
    }

  service:
    type: ClusterIP 
    ports:
      http: 8080
      https: 8081

  ingress:
    enabled: false # Set to true to use Kubernetes Ingress resource (requires Ingress Controller)
    className: "nginx" # Or your specific Ingress Controller class name
    host: "sso.example.com"
    path: /
    pathType: Prefix
    annotations: {} # Add any specific Ingress annotations here (e.g., cert-manager, rewrite rules)
    tls:
      enabled: false
      secretName: "" # e.g., sso-example-com-tls

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

  # Liveness and Readiness Probes
  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

  volumeMounts: []

  volumes: []
